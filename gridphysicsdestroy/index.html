
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Cloth Sandbox</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:Arial,sans-serif;
}

.star-line{
    position:fixed;
    left:0;
    width:100%;
    height:1px;
    background-image:url('stars.gif');
    background-repeat:repeat-x;
}

.window{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);

    width:1280px;
    height:780px;

    border:2px solid white;
    background:rgba(0,0,0,0.12);
    overflow:hidden;
    z-index:5;
}

#toolbar{
    position:absolute;
    top:0;
    left:0;
    right:0;

    height:54px;

    display:flex;
    align-items:center;
    gap:8px;

    padding:8px;

    background:rgba(0,0,0,0.6);

    border-bottom:1px solid rgba(255,255,255,0.15);

    z-index:20;
}

#sidebar{
    position:absolute;

    top:55px;
    left:0;
    bottom:0;

    width:260px;

    background:rgba(0,0,0,0.55);

    border-right:1px solid rgba(255,255,255,0.15);

    color:white;

    overflow:auto;

    padding:14px;

    z-index:20;
}

#sidebar h3{
    margin-top:0;
}

#sidebar label{
    display:block;
    margin-top:14px;
    font-size:13px;
}

#sidebar input,
#sidebar select{
    width:100%;
    margin-top:5px;

    background:black;
    color:white;

    border:1px solid rgba(255,255,255,0.2);

    padding:6px;
}

button{
    background:black;
    color:white;

    border:1px solid white;

    padding:8px 12px;

    cursor:pointer;
}

button.active{
    background:white;
    color:black;
}

canvas{
    position:absolute;

    left:261px;
    top:55px;

    width:calc(100% - 261px);
    height:calc(100% - 55px);

    display:block;
}
</style>
</head>
<body>

<script>
var totalLayers = 20;
var spacing = 50;

var currentPositions = [];
var speedFactors = [];
var isInverted = [];

function getPerspectiveSpeed(rowIndex) {
    var baseSpeed = 0.5;
    var zDepth = (totalLayers - rowIndex);
    return baseSpeed * (25 / zDepth);
}

function generateLayers() {

    for (var i = 0; i < totalLayers; i++) {

        var line = document.createElement("div");

        line.className = "star-line";
        line.id = "starLine" + i;

        line.style.top = ((i * spacing) + 50) + "px";

        var finalSpeed = getPerspectiveSpeed(i);

        if (i == 0) finalSpeed = getPerspectiveSpeed(15);
        if (i == 1) finalSpeed = getPerspectiveSpeed(14);
        if (i == 2) finalSpeed = getPerspectiveSpeed(13);
        if (i == 3) finalSpeed = getPerspectiveSpeed(12);
        if (i == 4) finalSpeed = getPerspectiveSpeed(11);
        if (i == 5) finalSpeed = getPerspectiveSpeed(10);
        if (i == 6) finalSpeed = getPerspectiveSpeed(9);
        if (i == 7) finalSpeed = getPerspectiveSpeed(8);

        speedFactors.push(finalSpeed);

        currentPositions.push(Math.floor(Math.random() * 250));

        isInverted.push(Math.random() > 0.5);

        document.body.appendChild(line);
    }
}

function updateGlidingPhysics() {

    for (var i = 0; i < totalLayers; i++) {

        var element = document.getElementById("starLine" + i);

        if (element) {

            currentPositions[i] += speedFactors[i];

            if (currentPositions[i] >= 250) {
                currentPositions[i] -= 250;
            }

            if (isInverted[i]) {
                element.style.transform = "scaleX(-1)";
                element.style.backgroundPositionX =
                    (-currentPositions[i]) + "px";
            } else {
                element.style.transform = "none";
                element.style.backgroundPositionX =
                    currentPositions[i] + "px";
            }
        }
    }

    requestAnimationFrame(updateGlidingPhysics);
}

generateLayers();
requestAnimationFrame(updateGlidingPhysics);
</script>

<div class="window">

    <div id="toolbar">

        <button id="dragBtn" class="active">DRAG</button>
        <button id="grabBtn">GRAB</button>
        <button id="slashBtn">SLASH</button>
        <button id="resetBtn">RESET</button>

    </div>

    <div id="sidebar">

        <h3>CLOTH OPTIONS</h3>

        <label>
            Grid Type
            <select id="gridType">
                <option value="square">Square</option>
                <option value="triangle">Triangle</option>
            </select>
        </label>

        <label>
            Fine Mode
            <input type="checkbox" id="fineMode">
        </label>

        <label>
            Cloth Strength
            <input type="range" min="20" max="220" value="90" id="strengthSlider">
        </label>

        <label>
            Connect Top
            <input type="checkbox" id="connectTop" checked>
        </label>

        <label>
            Connect Bottom
            <input type="checkbox" id="connectBottom">
        </label>

        <label>
            Connect Left
            <input type="checkbox" id="connectLeft">
        </label>

        <label>
            Connect Right
            <input type="checkbox" id="connectRight">
        </label>

    </div>

    <canvas id="canvas"></canvas>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){

    const rect = canvas.getBoundingClientRect();

    canvas.width = rect.width;
    canvas.height = rect.height;
}

window.addEventListener("resize", resize);
resize();

const points = [];
const springs = [];
const slashTrails = [];

const baseCols = 28;
const baseRows = 22;

const clothWidth = 760;
const clothHeight = 560;

const gravity = 0.08;
const friction = 0.985;
const stiffness = 0.14;

let tearStrength = 90;
let currentMode = "drag";
let grabbed = [];

class Point{

    constructor(x,y,pinned=false){

        this.x = x;
        this.y = y;

        this.oldx = x;
        this.oldy = y;

        this.pinned = pinned;
        this.grabbed = false;
    }

    update(){

        if(this.pinned || this.grabbed){
            return;
        }

        const vx = (this.x - this.oldx) * friction;
        const vy = (this.y - this.oldy) * friction;

        this.oldx = this.x;
        this.oldy = this.y;

        this.x += vx;
        this.y += vy + gravity;
    }
}

class Spring{

    constructor(a,b){

        this.a = a;
        this.b = b;

        this.length = dist(a,b);

        this.broken = false;
    }

    update(){

        if(this.broken){
            return;
        }

        const dx = this.b.x - this.a.x;
        const dy = this.b.y - this.a.y;

        const d = Math.sqrt(dx*dx + dy*dy) || 0.0001;

        if(d > tearStrength){
            this.broken = true;
            return;
        }

        const diff = (this.length - d) / d;

        const ox = dx * diff * stiffness;
        const oy = dy * diff * stiffness;

        if(!this.a.pinned && !this.a.grabbed){
            this.a.x -= ox;
            this.a.y -= oy;
        }

        if(!this.b.pinned && !this.b.grabbed){
            this.b.x += ox;
            this.b.y += oy;
        }
    }
}

function dist(a,b){

    const dx = b.x - a.x;
    const dy = b.y - a.y;

    return Math.sqrt(dx*dx + dy*dy);
}

function createGrid(){

    points.length = 0;
    springs.length = 0;

    const fine = fineMode.checked;

    const cols = fine ? baseCols * 2 : baseCols;
    const rows = fine ? baseRows * 2 : baseRows;

    const spacingX = clothWidth / (cols - 1);
    const spacingY = clothHeight / (rows - 1);

    for(let y=0;y<rows;y++){

        for(let x=0;x<cols;x++){

            const px = 40 + x * spacingX;
            const py = 40 + y * spacingY;

            const pinned =
                (connectTop.checked && y===0) ||
                (connectBottom.checked && y===rows-1) ||
                (connectLeft.checked && x===0) ||
                (connectRight.checked && x===cols-1);

            points.push(new Point(px,py,pinned));
        }
    }

    function idx(x,y){
        return y * cols + x;
    }

    for(let y=0;y<rows;y++){

        for(let x=0;x<cols;x++){

            if(x < cols-1){
                springs.push(new Spring(
                    points[idx(x,y)],
                    points[idx(x+1,y)]
                ));
            }

            if(y < rows-1){
                springs.push(new Spring(
                    points[idx(x,y)],
                    points[idx(x,y+1)]
                ));
            }

            if(gridType.value === "triangle"){

                if(x < cols-1 && y < rows-1){
                    springs.push(new Spring(
                        points[idx(x,y)],
                        points[idx(x+1,y+1)]
                    ));
                }

                if(x > 0 && y < rows-1){
                    springs.push(new Spring(
                        points[idx(x,y)],
                        points[idx(x-1,y+1)]
                    ));
                }
            }

            if(fine){

                if(x < cols-2){
                    springs.push(new Spring(
                        points[idx(x,y)],
                        points[idx(x+2,y)]
                    ));
                }

                if(y < rows-2){
                    springs.push(new Spring(
                        points[idx(x,y)],
                        points[idx(x,y+2)]
                    ));
                }
            }
        }
    }
}

createGrid();

function mode(btn,m){

    document.querySelectorAll("button")
    .forEach(b=>b.classList.remove("active"));

    btn.classList.add("active");

    currentMode = m;
}

dragBtn.onclick = ()=> mode(dragBtn,"drag");
grabBtn.onclick = ()=> mode(grabBtn,"grab");
slashBtn.onclick = ()=> mode(slashBtn,"slash");

resetBtn.onclick = ()=>{
    createGrid();
    slashTrails.length = 0;
};

[
    gridType,
    fineMode,
    connectTop,
    connectBottom,
    connectLeft,
    connectRight
].forEach(el=>{
    el.onchange = createGrid;
});

strengthSlider.oninput = ()=>{
    tearStrength = parseFloat(strengthSlider.value);
};

const mouse = {
    x:0,
    y:0,
    down:false
};

const velocitySamples = [];

canvas.addEventListener("mousedown", e=>{

    mouse.down = true;

    const r = canvas.getBoundingClientRect();

    mouse.x = e.clientX - r.left;
    mouse.y = e.clientY - r.top;

    grabbed = [];

    let nearest = null;
    let best = Infinity;

    for(const p of points){

        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;

        const d = Math.sqrt(dx*dx + dy*dy);

        if(d < best){
            best = d;
            nearest = p;
        }
    }

    if(nearest){

        for(const p of points){

            const dx = p.x - nearest.x;
            const dy = p.y - nearest.y;

            const d = Math.sqrt(dx*dx + dy*dy);

            if(
                (currentMode === "drag" && d < 1) ||
                (currentMode === "grab" && d < 44)
            ){

                p.grabbed = true;

                grabbed.push({
                    point:p,
                    ox:p.x - mouse.x,
                    oy:p.y - mouse.y
                });
            }
        }
    }
});

window.addEventListener("mouseup", ()=>{

    mouse.down = false;

    let avgVX = 0;
    let avgVY = 0;

    if(velocitySamples.length > 1){

        const first = velocitySamples[0];
        const last = velocitySamples[velocitySamples.length - 1];

        const totalDX = last.mx - first.mx;
        const totalDY = last.my - first.my;

        const totalTime = Math.max(1,last.t - first.t);

        avgVX = totalDX / totalTime * 16.666;
        avgVY = totalDY / totalTime * 16.666;
    }

    for(const g of grabbed){

        g.point.grabbed = false;

        g.point.oldx = g.point.x - Math.max(-8,Math.min(8,avgVX)) * 1.35;
        g.point.oldy = g.point.y - Math.max(-8,Math.min(8,avgVY)) * 1.35;
    }

    grabbed = [];
});

canvas.addEventListener("mousemove", e=>{

    const r = canvas.getBoundingClientRect();

    const oldX = mouse.x;
    const oldY = mouse.y;

    mouse.x = e.clientX - r.left;
    mouse.y = e.clientY - r.top;

    velocitySamples.push({
        mx:mouse.x,
        my:mouse.y,
        t:performance.now()
    });

    while(
        velocitySamples.length > 0 &&
        performance.now() - velocitySamples[0].t > 100
    ){
        velocitySamples.shift();
    }

    for(const g of grabbed){

        g.point.x = mouse.x + g.ox;
        g.point.y = mouse.y + g.oy;
    }

    if(currentMode === "slash" && mouse.down){

        for(let step=0;step<8;step++){

            const t = step / 7;

            const sx = oldX + (mouse.x - oldX) * t;
            const sy = oldY + (mouse.y - oldY) * t;

            slashTrails.push({
                x1:sx,
                y1:sy,
                x2:mouse.x,
                y2:mouse.y,
                life:1
            });

            for(const s of springs){

                if(s.broken){
                    continue;
                }

                const mx = (s.a.x + s.b.x) * 0.5;
                const my = (s.a.y + s.b.y) * 0.5;

                const dx = mx - sx;
                const dy = my - sy;

                if(Math.sqrt(dx*dx + dy*dy) < 18){
                    s.broken = true;
                }
            }
        }
    }
});

function render(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(const p of points){
        p.update();
    }

    for(let i=0;i<8;i++){
        for(const s of springs){
            s.update();
        }
    }

    ctx.strokeStyle = "white";
    ctx.lineWidth = 1;

    ctx.beginPath();

    for(const s of springs){

        if(s.broken){
            continue;
        }

        ctx.moveTo(s.a.x,s.a.y);
        ctx.lineTo(s.b.x,s.b.y);
    }

    ctx.stroke();

    ctx.strokeStyle = "rgba(255,255,255,0.8)";
    ctx.lineWidth = 4;

    for(let i=slashTrails.length-1;i>=0;i--){

        const t = slashTrails[i];

        t.life -= 0.08;

        if(t.life <= 0){
            slashTrails.splice(i,1);
            continue;
        }

        ctx.globalAlpha = t.life;

        ctx.beginPath();
        ctx.moveTo(t.x1,t.y1);
        ctx.lineTo(t.x2,t.y2);
        ctx.stroke();
    }

    ctx.globalAlpha = 1;

    requestAnimationFrame(render);
}

render();

</script>
</body>
</html>
